version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: receipt-helper-backend
    ports:
      - "8080:8000"
    env_file:
      - .env
    volumes:
      - ./token.json:/app/token.json:ro
    restart: unless-stopped
    networks:
      - receipt_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: receipt-helper-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - receipt_network

networks:
  receipt_network:
    driver: bridge
